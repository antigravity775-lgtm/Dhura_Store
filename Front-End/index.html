    <!-- EN: DNS-prefetch for external domains — reduces DNS lookup latency
         AR: استعلام DNS مسبق للنطاقات الخارجية — يقلل تأخير البحث في DNS -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- EN: Preconnect to Google Fonts — establishes connection early
         AR: اتصال مسبق بخطوط جوجل — يؤسس الاتصال مبكراً -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- EN: Google Fonts with display=swap — text remains visible during font load
         AR: خطوط جوجل مع display=swap — النص يبقى مرئياً أثناء تحميل الخط -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />

    <link rel="apple-touch-icon" sizes="192x192" href="/Logo_192.png" />
    <title>DHURA | ذُرى — متجر العطور الفاخرة</title>

    <!--
      EN: ANTI-FLICKER SCRIPT — Critical inline script that runs BEFORE React hydrates.
          This prevents the "white flash" (FOUC) when dark mode is active.
          
          Priority order:
          1. Check localStorage for manual preference (user's explicit choice)
          2. If no manual preference, check OS system preference via matchMedia
          3. Default to light mode if neither exists
          
      AR: سكريبت مضاد للوميض — سكريبت مضمّن حرج يعمل قبل تفعيل React.
          يمنع "الوميض الأبيض" (FOUC) عندما يكون الوضع الداكن مفعلاً.
    -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch(e) {}
      })();
    </script>

    <!-- EN: Inline critical CSS for the loading spinner used by React.lazy Suspense fallback.
             This ensures the spinner is styled BEFORE any JS chunk loads.
         AR: CSS حرج مضمّن لمؤشر التحميل المستخدم في Suspense fallback.
             يضمن أن المؤشر يحصل على تنسيق قبل تحميل أي جزء JS. -->
    <style>
      /* Prevent layout shift by setting minimum dimensions on root */
      #root { min-height: 100vh; }
      /* Pre-style the Suspense fallback spinner */
      .border-3 { border-width: 3px; }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
